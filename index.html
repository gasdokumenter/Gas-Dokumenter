<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GAS Dokumenter</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1f6yt3zIhgOKqw9S1NK1BEefHTAYoVV46&sz=w500">
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; }
    
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      /* Background Layering Miring */
      background: #F2C94C url('https://drive.google.com/thumbnail?id=139d2QGive0sNAbe0mQnj0jwxmElDQxrH&sz=w1200') no-repeat center center;
      background-size: cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }

    .container { position: relative; width: 200px; height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* Area Bulat Logo & Outline */
    .logo-circle-area { position: relative; width: 120px; height: 120px; display: flex; align-items: center; justify-content: center; }

    /* Logo Ruby Bulat */
    #main-logo { width: 90px; z-index: 2; opacity: 0; animation: fadeIn 0.3s ease forwards 0.1s; }

    /* Outline Melingkar (Hanya di area bulat) */
    .svg-outline { position: absolute; width: 120px; height: 120px; transform: rotate(-90deg); z-index: 3; }
    .circle-path {
      fill: none; stroke: #FFFFFF; stroke-width: 4; stroke-linecap: round;
      stroke-dasharray: 380; stroke-dashoffset: 380;
      animation: drawCircle 1s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.2s;
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes drawCircle { to { stroke-dashoffset: 0; } }

    /* Teks Filosofis Bawah */
    .footer-text {
      position: absolute; bottom: 50px; width: 90%; text-align: center;
      color: white; font-size: 10px; font-weight: 300; 
      line-height: 1.8; letter-spacing: 0.8px; opacity: 0.9;
    }

    iframe { border: none; width: 100%; height: 100%; display: block; }
    .fade-out { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="container">
      <div class="logo-circle-area">
        <svg class="svg-outline" viewBox="0 0 120 120">
          <circle class="circle-path" cx="60" cy="60" r="56" />
        </svg>
        <img id="main-logo" src="https://drive.google.com/thumbnail?id=1nxtbdq9brBCJwosXWLCxPYx5KWdO3Prg&sz=w500">
      </div>
    </div>
    
    <div class="footer-text">
      Dibuat untuk mempermudah dan mempersingkat segalanya<br>
      agar bisa mencari dan menemukan tujuan hidup yang berarti
    </div>
  </div>

  <iframe id="gas-app" src="https://script.google.com/macros/s/AKfycbwXZzLSN7UhOuuYP8HlmMRlFA_RVHEPexosytqmVuMoWBAE8ruZ9eddinJ7GnIlh8D4Jw/exec" onload="closeSplash()"></iframe>

  <script>
    function closeSplash() {
      // Total animasi sekitar 1.2 - 1.5 detik
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('fade-out');
      }, 1500); 
    }
  </script>
</body>
</html>
