<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GAS Dokumenter</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J&sz=w500">
  
  <style>
    /* RESET TOTAL & FORCE FULLSCREEN */
    * { box-sizing: border-box; }
    body, html { 
      margin: 0; padding: 0; 
      height: 100%; width: 100%; 
      overflow: hidden; 
      background-color: #F2C94C; 
    }
    
    #splash-screen {
      position: fixed; top: 0; left: 0; 
      width: 100vw; height: 100vh;
      /* STRETCHING BACKGROUND SAMPAI PENUH */
      background-image: url('https://drive.google.com/thumbnail?id=1EmFrWwPhnEeD40LRnBzm9cWMMRIQrrT8&sz=w1500');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: 100% 100%; /* Ini kuncinya biar stretch penuh menyesuaikan browser */
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
    }

    .brand-wrapper {
      display: flex; align-items: center;
      gap: 15px; z-index: 10; margin-top: -10px;
    }

    /* CONTAINER LOGO HATI */
    .logo-container {
      position: relative;
      width: 80px; height: 80px; /* Ukuran container */
      display: flex; align-items: center; justify-content: center;
    }

    #hati-logo {
      width: 48px; /* Logo diperkecil dikit sesuai request */
      z-index: 2;
    }

    /* SVG OUTLINE: LEBIH TIPIS & SPACING DIPERBESAR */
    .svg-loader {
      position: absolute;
      width: 80px; height: 80px;
      transform: rotate(-90deg);
      z-index: 3;
    }

    .circle-draw {
      fill: none;
      stroke: #FFFFFF;
      stroke-width: 4.5; /* Outline diperkecil (ditipisin) dikit */
      stroke-linecap: round;
      stroke-dasharray: 232; /* 2 * PI * 37 */
      stroke-dashoffset: 232;
      animation: draw 1.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
      animation-delay: 0.3s;
    }

    @keyframes draw { to { stroke-dashoffset: 0; } }

    #ruby-text { 
      height: 38px; /* Menyesuaikan Ruby Text */
      object-fit: contain; 
    }

    /* COPYRIGHT TEXT DI BAWAH */
    .footer-text {
      position: absolute; 
      bottom: 45px; /* Jarak dari bawah */
      width: 85%; 
      text-align: center;
      color: white; 
      font-size: 8.5px; 
      line-height: 1.5; 
      opacity: 0.85;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      letter-spacing: 0.3px;
      z-index: 10;
    }

    #app-frame {
      position: fixed; top: 0; left: 0; border: none; width: 100%; height: 100%;
      opacity: 0; z-index: 1;
    }

    .visible { opacity: 1 !important; transition: opacity 0.5s ease; }
    .hidden { opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="brand-wrapper">
      <div class="logo-container">
        <svg class="svg-loader" viewBox="0 0 80 80">
          <circle class="circle-draw" cx="40" cy="40" r="37" />
        </svg>
        <img id="hati-logo" src="https://drive.google.com/thumbnail?id=1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J&sz=w500" alt="Hati">
      </div>
      <img id="ruby-text" src="https://drive.google.com/thumbnail?id=1Qv9WabWHfZJZ8KH2-1qnseAA_4RERvB6&sz=w500" alt="Ruby Text">
    </div>
    
    <div class="footer-text">
      Dibuat untuk mempermudah dan mempersingkat segalanya<br>
      agar bisa mencari dan menemukan tujuan hidup yang berarti
    </div>
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbwXZzLSN7UhOuuYP8HlmMRlFA_RVHEPexosytqmVuMoWBAE8ruZ9eddinJ7GnIlh8D4Jw/exec" onload="finishSplash()"></iframe>

  <script>
    function finishSplash() {
      setTimeout(() => {
        document.getElementById('app-frame').classList.add('visible');
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('hidden');
        }, 120);
      }, 2300); 
    }
  </script>
</body>
</html>
