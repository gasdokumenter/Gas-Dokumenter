<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GAS Dokumenter</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J&sz=w500">
  
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #F2C94C; }
    
    /* BACKGROUND SVG DARI LINK DRIVE LO */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #F2C94C url('https://drive.google.com/thumbnail?id=1EmFrWwPhnEeD40LRnBzm9cWMMRIQrrT8&sz=w1300') no-repeat center center;
      background-size: cover;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
    }

    /* WRAPPER UTAMA (LOGO + TULISAN) */
    .brand-wrapper {
      display: flex;
      align-items: center;
      gap: 15px; /* Jarak antara logo hati dan tulisan Ruby */
      z-index: 10;
      margin-top: -30px;
    }

    /* CONTAINER KHUSUS LOGO HATI (YANG DILINGKARI) */
    .logo-container {
      position: relative;
      width: 100px; height: 100px;
      display: flex; align-items: center; justify-content: center;
    }

    #hati-logo {
      width: 55px; /* Ukuran logo hati */
      z-index: 2;
    }

    /* SVG GARIS PROGRESIF (HANYA UNTUK LOGO HATI) */
    .svg-loader {
      position: absolute;
      width: 100px; height: 100px;
      transform: rotate(-90deg);
      z-index: 3;
    }

    .circle-draw {
      fill: none;
      stroke: #FFFFFF;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 283; /* 2 * PI * 45 */
      stroke-dashoffset: 283;
      animation: draw 1.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
      animation-delay: 0.5s;
    }

    @keyframes draw { to { stroke-dashoffset: 0; } }

    /* TULISAN RUBY DI SAMPING LOGO */
    #ruby-text {
      height: 45px; /* Menyesuaikan tinggi agar sejajar logo */
      object-fit: contain;
    }

    /* FOOTER TEKS KECILLLL BANGET ALA DANA/GOPAY */
    .footer-text {
      position: absolute; bottom: 40px; width: 90%; text-align: center;
      color: white; font-size: 9px; /* Super kecil */
      line-height: 1.4; opacity: 0.8; letter-spacing: 0.3px;
    }

    #app-frame {
      position: fixed; top: 0; left: 0; border: none; width: 100%; height: 100%;
      opacity: 0; z-index: 1;
    }

    .visible { opacity: 1 !important; transition: opacity 0.6s ease; }
    .hidden { opacity: 0; visibility: hidden; transition: opacity 0.6s ease; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="brand-wrapper">
      <div class="logo-container">
        <svg class="svg-loader" viewBox="0 0 100 100">
          <circle class="circle-draw" cx="50" cy="50" r="45" />
        </svg>
        <img id="hati-logo" src="https://drive.google.com/thumbnail?id=1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J&sz=w500" alt="Hati">
      </div>
      
      <img id="ruby-text" src="https://drive.google.com/thumbnail?id=1Qv9WabWHfZJZ8KH2-1qnseAA_4RERvB6&sz=w500" alt="Ruby">
    </div>
    
    <div class="footer-text">
      Dibuat untuk mempermudah dan mempersingkat segalanya agar bisa mencari dan menemukan tujuan hidup yang berarti
    </div>
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbyR9mCWzwPZyBAnv93OZkQy-_DU2BeI1EIvNFQ9NLXVQeydGxEeI3fGQzqgFIAiTlaW_Q/exec" onload="finishSplash()"></iframe>

  <script>
    function finishSplash() {
      setTimeout(() => {
        document.getElementById('app-frame').classList.add('visible');
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('hidden');
        }, 150);
      }, 2500); 
    }
  </script>
</body>
</html>
