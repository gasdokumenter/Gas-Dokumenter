<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GAS Dokumenter</title>
  
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1f6yt3zIhgOKqw9S1NK1BEefHTAYoVV46&sz=w500">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #F2C94C; }
    
    /* BACKGROUND FULL STRETCH */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://lh3.googleusercontent.com/d/1Ib42zmpyOBi0o35hBHGf0lkJ7KhH1X4b') no-repeat center center;
      background-size: 100% 100%; /* Stretch bebas memenuhi layar */
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s;
    }

    /* CONTAINER LOGO UTAMA */
    .content-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -50px; /* Angkat sedikit ke atas agar visual balance */
    }

    .logo-container {
      position: relative;
      width: 180px; height: 180px; 
      display: flex; align-items: center; justify-content: center;
    }

    /* LOGO HATI (DI TENAH) */
    #logo-dasar {
      width: 75px; height: 75px; 
      z-index: 2;
    }

    /* SVG LOADER (LINGKARAN PUTIH) */
    .svg-loader {
      position: absolute;
      width: 130px; height: 130px; 
      transform: rotate(-90deg);
      z-index: 3;
    }

    .circle-draw {
      fill: none;
      stroke: #FFFFFF;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 440; /* Keliling lingkaran r=70 */
      stroke-dashoffset: 440;
      animation: draw 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes draw { to { stroke-dashoffset: 0; } }

    /* TEKS RUBY INDONESIA */
    .brand-logo {
      width: 180px; 
      margin-top: 10px;
      object-fit: contain;
    }

    /* TEKS FILOSOFIS (Gaya Copyright Apps) */
    .footer-text {
      position: absolute; bottom: 50px; width: 85%; text-align: center;
      color: white; font-size: 10px; line-height: 1.5; letter-spacing: 0.3px;
      opacity: 0.8;
      font-weight: 400;
    }

    #app-frame {
      position: fixed; top: 0; left: 0; border: none; width: 100%; height: 100%;
      opacity: 0; transition: opacity 0.5s ease; z-index: 1;
    }

    .visible { opacity: 1 !important; }
    .hidden { opacity: 0; visibility: hidden; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="content-wrapper">
      <div class="logo-container">
        <svg class="svg-loader" viewBox="0 0 160 160">
          <circle class="circle-draw" cx="80" cy="80" r="70" />
        </svg>
        <img id="logo-dasar" src="https://lh3.googleusercontent.com/d/1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J">
      </div>
      <img class="brand-logo" src="https://lh3.googleusercontent.com/d/1Qv9WabWHfZJZ8KH2-1qnseAA_4RERvB6">
    </div>
    
    <div class="footer-text">
      Dibuat untuk mempermudah dan mempersingkat segalanya<br>
      agar bisa mencari dan menemukan tujuan hidup yang berarti
    </div>
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbwXZzLSN7UhOuuYP8HlmMRlFA_RVHEPexosytqmVuMoWBAE8ruZ9eddinJ7GnIlh8D4Jw/exec" onload="initApp()"></iframe>

  <script>
    function initApp() {
      // Durasi total 1.5 detik (1500ms)
      setTimeout(() => {
        document.getElementById('app-frame').classList.add('visible');
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('hidden');
        }, 200);
      }, 1500); 
    }
  </script>
</body>
</html>
