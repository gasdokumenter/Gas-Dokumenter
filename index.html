<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GAS Dokumenter</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J&sz=w500">
  
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #F2C94C; }
    
    #splash-screen {
      position: fixed; top: 0; left: 0; 
      width: 100vw; height: 100vh; /* Paksa Full Screen */
      /* Link Background SVG lo */
      background: #F2C94C url('https://drive.google.com/thumbnail?id=1EmFrWwPhnEeD40LRnBzm9cWMMRIQrrT8&sz=w1500') no-repeat center center;
      background-size: cover; /* Background nutup semua tanpa celah */
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999;
    }

    .brand-wrapper {
      display: flex; align-items: center;
      gap: 12px; z-index: 10; margin-top: -20px;
    }

    /* CONTAINER LOGO HATI (DI-MEPET-IN) */
    .logo-container {
      position: relative;
      width: 75px; height: 75px; /* Perkecil container biar lingkaran mepet */
      display: flex; align-items: center; justify-content: center;
    }

    #hati-logo {
      width: 58px; /* Ukuran logo hati */
      z-index: 2;
    }

    /* SVG GARIS TEBAL & MEPET */
    .svg-loader {
      position: absolute;
      width: 75px; height: 75px;
      transform: rotate(-90deg);
      z-index: 3;
    }

    .circle-draw {
      fill: none;
      stroke: #FFFFFF;
      stroke-width: 8; /* Lingkaran dibuat LEBIH TEBAL */
      stroke-linecap: round;
      stroke-dasharray: 214; /* 2 * PI * 34 */
      stroke-dashoffset: 214;
      animation: draw 1.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
      animation-delay: 0.3s;
    }

    @keyframes draw { to { stroke-dashoffset: 0; } }

    #ruby-text { height: 42px; object-fit: contain; }

    /* FOOTER TEKS SUPER KECIL */
    .footer-text {
      position: absolute; bottom: 35px; width: 80%; text-align: center;
      color: white; font-size: 8.5px; line-height: 1.4; opacity: 0.8;
      font-family: sans-serif; letter-spacing: 0.2px;
    }

    #app-frame {
      position: fixed; top: 0; left: 0; border: none; width: 100%; height: 100%;
      opacity: 0; z-index: 1;
    }

    .visible { opacity: 1 !important; transition: opacity 0.5s ease; }
    .hidden { opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="brand-wrapper">
      <div class="logo-container">
        <svg class="svg-loader" viewBox="0 0 75 75">
          <circle class="circle-draw" cx="37.5" cy="37.5" r="34" />
        </svg>
        <img id="hati-logo" src="https://drive.google.com/thumbnail?id=1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J&sz=w500">
      </div>
      <img id="ruby-text" src="https://drive.google.com/thumbnail?id=1Qv9WabWHfZJZ8KH2-1qnseAA_4RERvB6&sz=w500">
    </div>
    
    <div class="footer-text">
      Dibuat untuk mempermudah dan mempersingkat segalanya agar bisa mencari dan menemukan tujuan hidup yang berarti
    </div>
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbwXZzLSN7UhOuuYP8HlmMRlFA_RVHEPexosytqmVuMoWBAE8ruZ9eddinJ7GnIlh8D4Jw/exec" onload="finishSplash()"></iframe>

  <script>
    function finishSplash() {
      setTimeout(() => {
        document.getElementById('app-frame').classList.add('visible');
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('hidden');
        }, 100);
      }, 2200); 
    }
  </script>
</body>
</html>
