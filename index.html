<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>GAS Dokumenter V3</title>
  <style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #F2C94C; font-family: sans-serif; }
    
    /* Splash Screen */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: url('https://drive.google.com/thumbnail?id=1Ib42zmpyOBi0o35hBHGf0lkJ7KhH1X4b&sz=w1500');
      background-size: 100% 100% !important; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
    }
    .brand-wrapper { display: flex; align-items: center; gap: 12px; margin-top: -30px; }
    .logo-container { position: relative; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
    #hati-logo { width: 54px; z-index: 2; }
    .svg-loader { position: absolute; width: 64px; height: 64px; transform: rotate(-90deg); z-index: 3; }
    .circle-draw { fill: none; stroke: #FFFFFF; stroke-width: 3.2; stroke-linecap: round; stroke-dasharray: 195; stroke-dashoffset: 195; animation: draw 1.6s cubic-bezier(0.65, 0, 0.35, 1) forwards; animation-delay: 0.3s; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    #ruby-text { height: 54px; object-fit: contain; }

    /* Profile UI */
    .profile-badge {
      position: fixed; top: 15px; right: 15px; width: 38px; height: 38px;
      border-radius: 50%; border: 2px solid #fff; cursor: pointer; z-index: 10000;
      background-size: cover; background-position: center; background-color: #F2C94C; display: none;
    }
    #profile-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); z-index: 20000;
    }
    #profile-modal {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; width: 85%; max-width: 300px; border-radius: 24px; padding: 25px; text-align: center;
    }
    .modal-photo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #F2C94C; margin-bottom: 15px; }
    .btn-switch { background: #F2C94C; color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
    .btn-logout { background: #f0f0f0; color: #666; border: none; padding: 10px; width: 100%; border-radius: 12px; cursor: pointer; }

    #app-frame { position: fixed; top: 0; left: 0; border: none; width: 100%; height: 100%; opacity: 0; z-index: 1; }
    .visible { opacity: 1 !important; transition: opacity 0.5s ease; }
    .hidden { opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
    #queue-status { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); color: white; padding: 8px 15px; border-radius: 20px; font-size: 11px; z-index: 5000; display: none; font-weight: bold; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="brand-wrapper">
      <div class="logo-container">
        <svg class="svg-loader" viewBox="0 0 64 64"><circle class="circle-draw" cx="32" cy="32" r="31" /></svg>
        <img id="hati-logo" src="https://drive.google.com/thumbnail?id=1p3ucC2P6VUqle4izxSQUw8sZMAwsk_9J&sz=w500">
      </div>
      <img id="ruby-text" src="https://drive.google.com/thumbnail?id=1Qv9WabWHfZJZ8KH2-1qnseAA_4RERvB6&sz=w500">
    </div>
  </div>

  <div class="profile-badge" id="user-badge" onclick="toggleProfile(true)"></div>
  <div id="profile-overlay" onclick="toggleProfile(false)">
    <div id="profile-modal" onclick="event.stopPropagation()">
      <img src="" id="modal-img" class="modal-photo">
      <div id="modal-name" style="font-weight: 800; font-size: 18px; color: #333;">...</div>
      <div id="modal-email" style="font-size: 12px; color: #888; margin-bottom: 20px;">...</div>
      <button class="btn-switch" onclick="switchAccount()">Ganti Akun</button>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div id="queue-status">Memproses...</div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbwIfiJG1ZZK3A_Ljt37WRD3CZ1YT_SKKoIJMauoSjD5cBUcdV2kzFpGeYBujIIiyhD_sw/exec" onload="finishSplash()"></iframe>

  <script>
    let uploadQueue = [];
    let isUploading = false;

    function finishSplash() {
      setTimeout(() => {
        document.getElementById('app-frame').classList.add('visible');
        document.getElementById('user-badge').style.display = 'block';
        setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden'); }, 200);
        loadUserInfo();
      }, 2500);
    }

    function toggleProfile(show) { document.getElementById('profile-overlay').style.display = show ? 'block' : 'none'; }
    function loadUserInfo() { document.getElementById('app-frame').contentWindow.postMessage({ type: 'GET_USER' }, '*'); }
    function switchAccount() { window.open("https://accounts.google.com/AddSession", "_blank"); }
    function logout() { window.location.href = "https://accounts.google.com/Logout"; }

    window.addEventListener('message', function(e) {
      const d = e.data;
      if (d.type === 'USER_DATA') {
        document.getElementById('user-badge').style.backgroundImage = `url('${d.photoUrl}')`;
        document.getElementById('modal-img').src = d.photoUrl;
        document.getElementById('modal-name').innerText = d.name;
        document.getElementById('modal-email').innerText = d.email;
      }
      if (d.type === 'ADD_TO_QUEUE') {
        uploadQueue.push(d);
        updateQueueUI();
      }
      if (d.type === 'START_BULK_UPLOAD') {
        processQueue(d.pId, d.cName);
      }
    });

    function updateQueueUI() {
      const qs = document.getElementById('queue-status');
      qs.style.display = uploadQueue.length > 0 ? 'block' : 'none';
      qs.innerText = `Mengupload ${uploadQueue.length} file...`;
    }

    async function processQueue(pId, cName) {
      if (isUploading || uploadQueue.length === 0) return;
      isUploading = true;
      
      const gas = document.getElementById('app-frame').contentWindow;
      
      // Ambil Token
      const token = await new Promise(res => {
        const h = (ev) => { if(ev.data.type === 'AUTH_TOKEN'){ window.removeEventListener('message', h); res(ev.data.token); }};
        window.addEventListener('message', h);
        gas.postMessage({type:'GET_AUTH'}, '*');
      });

      // Bikin/Ambil Folder
      const folderId = await new Promise(res => {
        const h = (ev) => { if(ev.data.type === 'FOLDER_READY'){ window.removeEventListener('message', h); res(ev.data.folderId); }};
        window.addEventListener('message', h);
        gas.postMessage({type:'CREATE_FOLDER', pId, cName}, '*');
      });

      while (uploadQueue.length > 0) {
        const item = uploadQueue[0];
        try {
          await uploadToDrive(item, folderId, token);
          uploadQueue.shift();
          updateQueueUI();
        } catch (err) { console.error(err); break; }
      }
      isUploading = false;
      gas.postMessage({type: 'UPLOAD_DONE'}, '*');
    }

    function uploadToDrive(item, fId, token) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
        xhr.setRequestHeader('Authorization', 'Bearer ' + token);
        const meta = { name: item.fileName, parents: [fId] };
        const fd = new FormData();
        fd.append('metadata', new Blob([JSON.stringify(meta)], {type: 'application/json'}));
        fd.append('file', item.file);
        xhr.onload = () => resolve();
        xhr.onerror = () => reject();
        xhr.send(fd);
      });
    }
  </script>
</body>
</html>
