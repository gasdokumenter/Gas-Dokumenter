<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GAS Dokumenter</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://drive.google.com/thumbnail?id=1f6yt3zIhgOKqw9S1NK1BEefHTAYoVV46&sz=w500">
  
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; }
    
    /* BACKGROUND DENGAN LAYERING GEOMETRIS */
    #splash-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #F2C94C; /* Warna dasar kuning */
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
      overflow: hidden;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    /* Layer Kotak 1 (Miring) */
    #splash-screen::before {
      content: "";
      position: absolute;
      width: 150%; height: 150%;
      background: rgba(255, 255, 255, 0.1);
      transform: rotate(25deg);
      top: -20%;
      z-index: 0;
    }

    /* Layer Kotak 2 (Lebih miring) */
    #splash-screen::after {
      content: "";
      position: absolute;
      width: 130%; height: 130%;
      background: rgba(0, 0, 0, 0.03);
      transform: rotate(-15deg);
      bottom: -10%;
      z-index: 0;
    }

    .logo-wrapper { 
      position: relative; 
      width: 220px; height: 220px; 
      display: flex; align-items: center; justify-content: center;
      z-index: 2; /* Di atas background miring */
    }

    #splash-logo { 
      width: 100px; 
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
    }

    .outline-svg {
      position: absolute; top: 0; left: 0; width: 220px; height: 220px;
      transform: rotate(-90deg);
    }

    .outline-circle {
      fill: none;
      stroke: #FFFFFF;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 630;
      stroke-dashoffset: 630;
      animation: drawOutline 1.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
      animation-delay: 0.5s;
    }

    @keyframes drawOutline {
      to { stroke-dashoffset: 0; }
    }

    .splash-footer {
      position: absolute; bottom: 50px; width: 85%; text-align: center;
      color: white; font-size: 11px; font-weight: 400;
      opacity: 0.95; line-height: 1.6; z-index: 2;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    iframe { border: none; width: 100%; height: 100%; display: block; background: white; }
    .hidden { opacity: 0; visibility: hidden; }
  </style>
</head>
<body>

  <div id="splash-screen">
    <div class="logo-wrapper">
      <svg class="outline-svg" viewBox="0 0 220 220">
        <circle class="outline-circle" cx="110" cy="110" r="100" />
      </svg>
      <img id="splash-logo" src="https://drive.google.com/thumbnail?id=1f6yt3zIhgOKqw9S1NK1BEefHTAYoVV46&sz=w500">
    </div>
    
    <div class="splash-footer">
      Dibuat untuk mempermudah dan mempersingkat segalanya<br>
      agar bisa mencari dan menemukan tujuan hidup yang berarti
    </div>
  </div>

  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbwXZzLSN7UhOuuYP8HlmMRlFA_RVHEPexosytqmVuMoWBAE8ruZ9eddinJ7GnIlh8D4Jw/exec" onload="startApp()"></iframe>

  <script>
    function startApp() {
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
      }, 3000); 
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
